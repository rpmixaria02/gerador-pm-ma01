<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Simulado PM-MA · Ilimitado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0A0F1E;
            color: #E8EDF5;
            padding: 10px;
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        body.mobile .container {
            max-width: 600px;
            margin: 0 auto;
        }
        body.desktop .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        body.desktop .questao .texto {
            font-size: 15px;
        }
        body.desktop .questao .botoes button {
            font-size: 14px;
            padding: 12px;
        }
        body.desktop .stats div {
            font-size: 14px;
            padding: 6px 14px;
        }
        body.desktop .stats .num {
            font-size: 18px;
        }
        body.desktop .header h1 {
            font-size: 24px;
        }
        body.desktop .controles select {
            font-size: 14px;
            padding: 8px 14px;
            min-width: 200px;
        }
        body.desktop .controles button {
            font-size: 14px;
            padding: 8px 16px;
        }
        body.desktop .controles input {
            font-size: 14px;
            padding: 8px 12px;
            width: 80px;
        }
        body.desktop .controles input[type="text"] {
            width: 120px;
        }
        body.desktop .sala-box .codigo {
            font-size: 24px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #0F1A3A, #1A2A55);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #2A3A55;
        }
        .header h1 {
            font-size: 18px;
            margin-bottom: 2px;
        }
        .header h1 span {
            color: #22D3EE;
        }
        .header .sub {
            font-size: 11px;
            color: #8899B0;
        }
        .header .badge {
            display: inline-block;
            background: #0891B2;
            color: #fff;
            font-size: 9px;
            padding: 2px 10px;
            border-radius: 10px;
            margin-top: 4px;
        }
        .stats {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .stats div {
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
        }
        .stats .num {
            font-weight: 700;
            font-size: 16px;
        }
        .stats .verde {
            color: #22C55E;
        }
        .stats .vermelho {
            color: #EF4444;
        }
        .stats .ciano {
            color: #22D3EE;
        }
        .stats .dourado {
            color: #F59E0B;
        }
        .progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress .fill {
            height: 100%;
            background: linear-gradient(90deg, #0891B2, #22D3EE);
            width: 0%;
            border-radius: 4px;
            transition: width .3s;
        }
        .sala-box {
            background: rgba(34, 211, 238, 0.08);
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(34, 211, 238, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .sala-box .codigo {
            font-size: 20px;
            font-weight: 700;
            color: #22D3EE;
            letter-spacing: 3px;
            font-family: monospace;
        }
        .sala-box .label {
            font-size: 10px;
            color: #8899B0;
        }
        .sala-box button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #2A3A55;
            color: #E8EDF5;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }
        .sala-box button:active {
            opacity: .6;
        }
        .controles {
            background: #141B2D;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2A3A55;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .controles select,
        .controles input,
        .controles button {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #2A3A55;
            background: #0A0F1E;
            color: #E8EDF5;
        }
        .controles select {
            flex: 1;
            min-width: 100px;
            -webkit-appearance: none;
            appearance: none;
        }
        .controles input {
            width: 50px;
            text-align: center;
        }
        .controles .btn-azul {
            background: #0891B2;
            border-color: #0891B2;
            font-weight: 600;
            color: #fff;
        }
        .controles .btn-dourado {
            background: #F59E0B;
            border-color: #F59E0B;
            font-weight: 700;
            color: #000;
        }
        .controles .btn-cinza {
            background: #1E2842;
            border-color: #2A3A55;
        }
        .controles input[type="text"] {
            width: 70px;
            text-align: center;
            text-transform: uppercase;
        }
        .switch-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #141B2D;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #2A3A55;
            margin-bottom: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .switch-container label {
            font-size: 12px;
            color: #8899B0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .switch-container input[type="checkbox"] {
            width: 44px;
            height: 24px;
            -webkit-appearance: none;
            appearance: none;
            background: #2A3A55;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background .3s;
            flex-shrink: 0;
        }
        .switch-container input[type="checkbox"]:checked {
            background: #0891B2;
        }
        .switch-container input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform .3s;
        }
        .switch-container input[type="checkbox"]:checked::before {
            transform: translateX(20px);
        }
        .switch-container .icone {
            font-size: 18px;
        }

        .filtros {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .filtros button {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #2A3A55;
            background: #141B2D;
            color: #8899B0;
            cursor: pointer;
        }
        .filtros button:active {
            opacity: .6;
        }
        .filtros button.ativo {
            background: #0891B2;
            color: #fff;
            border-color: #0891B2;
        }
        .questao {
            background: #141B2D;
            border: 1px solid #2A3A55;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-left: 3px solid #2A3A55;
        }
        .questao.certa {
            border-left-color: #22C55E;
        }
        .questao.errada {
            border-left-color: #EF4444;
        }
        .questao .meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 6px;
            font-size: 10px;
        }
        .questao .meta .id {
            color: #22D3EE;
            background: rgba(34, 211, 238, 0.1);
            padding: 1px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: 600;
        }
        .questao .meta .topico {
            color: #8899B0;
            background: #1E2842;
            padding: 1px 8px;
            border-radius: 4px;
        }
        .questao .meta .status {
            padding: 1px 8px;
            border-radius: 4px;
        }
        .questao .meta .status.pendente {
            background: #2A2A1A;
            color: #F59E0B;
        }
        .questao .meta .status.feito {
            background: #1A3A2A;
            color: #22C55E;
        }
        .questao .meta .status.erro {
            background: #3A1A1A;
            color: #EF4444;
        }
        .questao .texto {
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .questao .botoes {
            display: flex;
            gap: 6px;
        }
        .questao .botoes button {
            flex: 1;
            font-size: 12px;
            font-weight: 600;
            padding: 8px;
            border-radius: 6px;
            border: 1.5px solid #2A3A55;
            background: #0A0F1E;
            color: #E8EDF5;
            cursor: pointer;
        }
        .questao .botoes button:active {
            opacity: .6;
        }
        .questao .botoes button:disabled {
            opacity: .4;
            cursor: default;
        }
        .questao .botoes .certo:active {
            border-color: #22C55E;
            color: #22C55E;
        }
        .questao .botoes .errado:active {
            border-color: #EF4444;
            color: #EF4444;
        }
        .questao .botoes .certo.selecionado {
            background: #22C55E;
            color: #fff;
            border-color: #22C55E;
        }
        .questao .botoes .errado.selecionado {
            background: #EF4444;
            color: #fff;
            border-color: #EF4444;
        }
        .questao .feedback {
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.5;
            display: none;
        }
        .questao .feedback.mostrar {
            display: block;
        }
        .questao .feedback.ok {
            background: #1A3A2A;
            color: #22C55E;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .questao .feedback.no {
            background: #3A1A1A;
            color: #EF4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .ranking {
            background: #141B2D;
            border: 1px solid #2A3A55;
            border-radius: 10px;
            padding: 14px 16px;
            margin-top: 12px;
            display: none;
        }
        .ranking h3 {
            font-size: 13px;
            color: #F59E0B;
            margin-bottom: 10px;
        }
        .ranking .item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 12px;
        }
        .ranking .item:last-child {
            border-bottom: none;
        }
        .ranking .item .pos {
            font-weight: 700;
            width: 26px;
            font-family: monospace;
            color: #8899B0;
        }
        .ranking .item .pos.ouro {
            color: #F59E0B;
        }
        .ranking .item .pos.prata {
            color: #C0C0C0;
        }
        .ranking .item .pos.bronze {
            color: #CD7F32;
        }
        .ranking .item .nome {
            flex: 1;
        }
        .ranking .item .nota {
            font-weight: 700;
            color: #F59E0B;
            font-family: monospace;
        }
        .ranking .item .detalhes {
            font-size: 10px;
            color: #8899B0;
        }
        .footer {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            padding-top: 16px;
        }
        .footer button {
            font-size: 10px;
            color: #8899B0;
            background: none;
            border: 1px dashed #2A3A55;
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .footer button:active {
            opacity: .6;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #141B2D;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            border: 1px solid #2A3A55;
            font-size: 13px;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }
        .toast.mostrar {
            opacity: 1;
        }
        .vazio {
            text-align: center;
            padding: 30px 20px;
            color: #8899B0;
            font-size: 13px;
        }
        .aviso-geracao {
            background: rgba(34, 211, 238, 0.1);
            color: #22D3EE;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 10px;
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        @media (max-width:480px) {
            .controles select {
                min-width: 70px;
                font-size: 11px;
                padding: 5px 8px;
            }
            .controles input {
                width: 40px;
                font-size: 11px;
                padding: 5px 4px;
            }
            .controles button {
                font-size: 11px;
                padding: 5px 8px;
            }
            .controles input[type="text"] {
                width: 60px;
            }
            .questao .texto {
                font-size: 12px;
            }
            .questao .botoes button {
                font-size: 11px;
                padding: 6px;
            }
            .sala-box .codigo {
                font-size: 16px;
            }
            .stats div {
                font-size: 11px;
                padding: 3px 8px;
            }
            .stats .num {
                font-size: 14px;
            }
            .header h1 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body class="mobile" id="body">
    <div class="container">

        <!-- SWITCH MOBILE/DESKTOP -->
        <div class="switch-container">
            <span class="icone">📱</span>
            <label>

        <div class="controles">

                <option value="busca">🔍 Busca</option>

            <input type="text" id="codigoEntrada" placeholder="Código" maxlength="6">
            <button class="btn-cinza" id="entrarSalaBtn">🔑 Entrar</button>
        </div>

        <div id="avisoContainer"></div>

        <div class="filtros">
            <button class="ativo" data-filtro="todas">📋 Todas</button>
            <button data-filtro="nao">⏳ Pendentes</button>
            <button data-filtro="acertadas">✅ Acertadas</button>
            <button data-filtro="erradas">❌ Erradas</button>
        </div>

        <div id="listaQuestoes"></div>
        <div class="vazio" id="vazio">📝 Clique em "Gerar" para começar!</div>

        <div class="ranking" id="rankingBox"><h3>🏆 RANKING</h3><div id="rankingList"></div></div>

        <div class="footer">
            <button id="resetBtn">↺ Reiniciar</button>
            <button id="exportBtn">📤 Exportar</button>
            <button id="sairSalaBtn" style="border-color:#EF4444;color:#EF4444;">🚪 Sair</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>

        // ============================================================
        // GERADOR ILIMITADO - CRIA QUESTÕES INFINITAS
        // ============================================================
        function gerarQuestoesIlimitadas(topic, quantidade) {
            // Pegar questões base do tópico
            var pool = [];
            for (var i = 0; i < BASE_DATA.length; i++) {
                if (topic === 'todos' || BASE_DATA[i].c === topic) {
                    pool.push(BASE_DATA[i]);
                }
            }

            // Se não tiver questões, criar algumas genéricas
            if (pool.length === 0) {
                pool = [
                    { c: topic, s: "Esta é uma questão genérica sobre " + topic + ".", a: true,
                    j: "Justificativa genérica." },
                    { c: topic, s: "Esta é outra questão genérica sobre " + topic + ".", a: false,
                        j: "Justificativa genérica." }
                ];
            }

            var result = [];
            var poolSize = pool.length;

            // GERAR ILIMITADO: repetir o pool com variações
            for (var j = 0; j < quantidade; j++) {
                var original = pool[j % poolSize];
                var nova = {
                    c: original.c,
                    s: original.s,
                    a: original.a,
                    j: original.j,
                    id: j + 1,
                    answered: false,
                    correct: null,
                    gerada: j >= poolSize // Marcar se foi gerada por repetição
                };
                result.push(nova);
            }

            // Embaralhar
            for (var k = result.length - 1; k > 0; k--) {
                var rand = Math.floor(Math.random() * (k + 1));
                var temp = result[k];
                result[k] = result[rand];
                result[rand] = temp;
            }

            return result;
        }

        function render() {
            var listEl = document.getElementById('listaQuestoes');
            var emptyEl = document.getElementById('vazio');

            var visible = [];
            for (var i = 0; i < state.length; i++) {
                var q = state[i];
                if (currentFilter === 'nao' && q.answered) continue;
                if (currentFilter === 'acertadas' && (!q.answered || !q.correct)) continue;
                if (currentFilter === 'erradas' && (!q.answered || q.correct)) continue;
                visible.push(q);
            }

            if (state.length === 0) {
                emptyEl.textContent = '📝 Clique em "Gerar" para começar!';
                emptyEl.style.display = 'block';
                updateStats();
                return;

            if (visible.length === 0) {
                emptyEl.textContent = 'Nenhuma questão neste filtro.';
            }

                var q = visible[v];

                card.innerHTML =
                    '<div class="meta">' +
                    '<span class="id">Q ' + idStr + '</span>' +
                    '<span class="topico">' + getTopicLabel(q.c) + geradaTag + '</span>' +
                    '<span class="status ' + statusClass + '">' + statusText + '</span>' +
                    '</div>' +
                    '<div class="texto">' + q.s + '</div>' +
                    '<div class="botoes">' +
                    '<button class="certo" data-id="' + q.id + '" data-val="true"' + (q.answered ? ' disabled' : '') +
                    '>✅ CERTO</button>' +
                    '<button class="errado" data-id="' + q.id + '" data-val="false"' + (q.answered ? ' disabled' : '') +
                    '>❌ ERRADO</button>' +
                    '</div>' +
                    '<div class="feedback ' + (q.answered ? 'mostrar' : '') + ' ' + (q.answered ? (q.correct ? 'ok' :
                        'no') : '') + '">' +
                    (q.answered ? '<b>' + (q.correct ? '✅ Acertou!' : '❌ Errou.') + '</b> Gabarito: <b>' + (q.a ?
                        'CERTO' : 'ERRADO') + '</b>. ' + q.j : '') +
                    '</div>';

                listEl.appendChild(card);

                if (!q.answered) {
                    var btnCerto = card.querySelector('.certo');
                    var btnErrado = card.querySelector('.errado');
                    btnCerto.addEventListener('click', function(e) {
                        var id = parseInt(e.target.getAttribute('data-id'));
                        responder(id, true);
                    });
                    btnErrado.addEventListener('click', function(e) {
                        var id = parseInt(e.target.getAttribute('data-id'));
                        responder(id, false);
                    });
                } else {
                    var btnCerto2 = card.querySelector('.certo');
                    var btnErrado2 = card.querySelector('.errado');
                    var userPicked = q.correct ? q.a : !q.a;
                    if (userPicked === true) {
                        btnCerto2.className += ' selecionado';
                        btnErrado2.className += ' unpicked';
                    } else {
                        btnErrado2.className += ' selecionado';
                        btnCerto2.className += ' unpicked';
                    }
                }
            }

            updateStats();
            salvarProgresso();
            atualizarRanking();
        }

        function responder(id, userAnswer) {
            var q = null;
            for (var i = 0; i < state.length; i++) {
                if (state[i].id === id) { q = state[i]; break; }
            }
            if (!q || q.answered) return;
            q.answered = true;
            q.correct = (userAnswer === q.a);

            if (meuNome && codigoSala) {
                var participante = null;
                for (var p = 0; p < participantes.length; p++) {
                    if (participantes[p].nome === meuNome) { participante = participantes[p]; break; }
                }
                if (participante) {
                    participante.respostas = participante.respostas || {};
                    participante.respostas[id] = userAnswer;
                    salvarSala();
                }
            }

            render();
        }

        function updateStats() {
            var answered = 0,
                certas = 0,
                erradas = 0;
            for (var i = 0; i < state.length; i++) {
                if (state[i].answered) {
                    answered++;
                    if (state[i].correct) certas++;
                    else erradas++;
                }
            }
            var nota = certas - erradas;
            document.getElementById('statCertas').textContent = certas;
            document.getElementById('statErradas').textContent = erradas;
            document.getElementById('statTotal').textContent = answered + '/' + state.length;
            document.getElementById('statNota').textContent = nota;
            var progress = state.length > 0 ? (answered / state.length) * 100 : 0;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function salvarProgresso() {
            try {
                localStorage.setItem('simulado_pm_ma', JSON.stringify({
                    state: state,
                    currentFilter: currentFilter,
                    currentTopic: currentTopic,
                    timestamp: new Date().toISOString()
                }));
            } catch (e) {}
        }

        function carregarProgresso() {
            var s = localStorage.getItem('simulado_pm_ma');
            if (!s) return false;
            try {
                var d = JSON.parse(s);
                if (d.state && d.state.length > 0) {
                    state = d.state;
                    currentFilter = d.currentFilter || 'todas';
                    currentTopic = d.currentTopic || 'todos';
                    var b = document.querySelectorAll('.filtros button');
                    for (var i = 0; i < b.length; i++) {
                        b[i].className = '';
                        if (b[i].getAttribute('data-filtro') === currentFilter) {
                            b[i].className = 'ativo';
                        }
                    }
                    var sel = document.getElementById('topicSelect');
                    for (var j = 0; j < sel.options.length; j++) {
                        if (sel.options[j].value === currentTopic) {
                            sel.selectedIndex = j;
                            break;
                        }
                    }
                    render();
                    return true;
                }
            } catch (e) {}
            return false;
        }

        function exportarDesempenho() {
            if (state.length === 0) {
                mostrarToast('⚠️ Nenhum simulado para exportar.');
                return;
            }
            var a = 0,
                c = 0,
                e = 0;
            for (var i = 0; i < state.length; i++) {
                if (state[i].answered) {
                    a++;
                    if (state[i].correct) c++;
                    else e++;
                }
            }
            var n = c - e;
            var txt = '=== RELATÓRIO PM-MA ===\n';
            txt += 'Data: ' + new Date().toLocaleString() + '\n';
            txt += 'Tópico: ' + getTopicLabel(currentTopic) + '\n';
            txt += 'Total: ' + state.length + ' questões\n';
            txt += '✅ Certas: ' + c + '\n';
            txt += '❌ Erradas: ' + e + '\n';
            txt += '⭐ Nota Cebraspe: ' + n + '\n\n';
            txt += '--- QUESTÕES ERRADAS ---\n';
            var er = [];
            for (var k = 0; k < state.length; k++) {
                if (state[k].answered && !state[k].correct) er.push(state[k]);
            }
            if (er.length === 0) {
                txt += '(Nenhuma questão errada. Parabéns! 🎉)\n';
            } else {
                for (var m = 0; m < er.length; m++) {
                    var q = er[m];
                    txt += '\nQ' + String(q.id).padStart(3, '0') + ' [' + getTopicLabel(q.c) + ']\n';
                    txt += '  ' + q.s + '\n';
                    txt += '  Gabarito: ' + (q.a ? 'CERTO' : 'ERRADO') + '\n';
                    txt += '  ' + q.j + '\n';
                }
            }
            var blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'desempenho_pm_ma_' + new Date().toISOString().slice(0, 10) + '.txt';
            link.click();
            URL.revokeObjectURL(link.href);
            mostrarToast('📤 Relatório exportado!');
        }

        function reiniciar() {
            if (state.length === 0) {
                mostrarToast('⚠️ Nenhum simulado ativo.');
                return;
            }
            if (!confirm('Resetar suas respostas?')) return;
            for (var i = 0; i < state.length; i++) {
                state[i].answered = false;
                state[i].correct = null;
            }
            if (meuNome && codigoSala) {
                var p = null;
                for (var j = 0; j < participantes.length; j++) {
                    if (participantes[j].nome === meuNome) { p = participantes[j]; break; }
                }
                if (p) p.respostas = {};
                salvarSala();
            }
            render();
            mostrarToast('↺ Respostas resetadas!');
        }

        function mostrarToast(msg) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast mostrar';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function() {
                el.className = 'toast';
            }, 2500);
        }

        // ===== FUNÇÕES DA SALA =====
        function gerarCodigoSala() { var c = '';
            for (var i = 0; i < 6; i++) { c += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.charAt(Math.floor(Math.random() *
                    36)) } return c }

        function criarSala() {
            var n = prompt('Digite seu nome:');
            if (!n) return;
            meuNome = n;
            codigoSala = gerarCodigoSala();
            document.getElementById('codigoSala').textContent = codigoSala;
            document.getElementById('numPessoas').textContent = '1';
            participantes = [{ nome: n, respostas: {} }];
            document.getElementById('rankingBox').style.display = 'block';
            atualizarRanking();
            mostrarToast('✅ Sala "' + codigoSala + '" criada!');
            document.getElementById('codigoEntrada').value = codigoSala;
            salvarSala();
        }

        function entrarSala() {
            var c = document.getElementById('codigoEntrada').value.trim().toUpperCase();
            if (!c) { mostrarToast('⚠️ Digite o código!'); return }
            var n = prompt('Digite seu nome:');
            if (!n) return;
            meuNome = n;
            codigoSala = c;
            document.getElementById('codigoSala').textContent = c;
            var s = localStorage.getItem('sala_' + c);
            if (s) {
                try {
                    var d = JSON.parse(s);
                    participantes = d.participants || [];
                    var e = false;
                    for (var i = 0; i < participantes.length; i++) {
                        if (participantes[i].nome === n) { e = true; break; }
                    }
                    if (!e) { participantes.push({ nome: n, respostas: {} }) }
                    document.getElementById('numPessoas').textContent = participantes.length;
                    document.getElementById('rankingBox').style.display = 'block';
                    atualizarRanking();
                    mostrarToast('✅ Entrou na sala "' + c + '"!');
                    salvarSala();
                } catch (e) { mostrarToast('⚠️ Erro ao entrar.') }
            } else {
                participantes = [{ nome: n, respostas: {} }];
                document.getElementById('numPessoas').textContent = '1';
                document.getElementById('rankingBox').style.display = 'block';
                salvarSala();
                mostrarToast('✅ Sala "' + c + '" criada!');
            }
        }

        function salvarSala() {
            if (!codigoSala) return;
            localStorage.setItem('sala_' + codigoSala, JSON.stringify({ participants: participantes, codigo: codigoSala }));
            localStorage.setItem('sala_ativa', codigoSala);
        }

        function carregarSala() {
            var c = localStorage.getItem('sala_ativa');
            if (!c) return false;
            var s = localStorage.getItem('sala_' + c);
            if (!s) return false;
            try {
                var d = JSON.parse(s);
                codigoSala = c;
                participantes = d.participants || [];
                document.getElementById('codigoSala').textContent = c;
                document.getElementById('numPessoas').textContent = participantes.length;
                if (participantes.length > 0) {
                    document.getElementById('rankingBox').style.display = 'block';
                    atualizarRanking();
                }
                return true;
            } catch (e) { return false }
        }

        function sairSala() {
            if (!codigoSala) return;
            if (confirm('Sair da sala?')) {
                localStorage.removeItem('sala_ativa');
                codigoSala = '';
                participantes = [];
                document.getElementById('codigoSala').textContent = '------';
                document.getElementById('numPessoas').textContent = '0';
                document.getElementById('rankingBox').style.display = 'none';
                mostrarToast('🚪 Saiu da sala.');
            }
        }

        function copiarCodigo() {
            if (!codigoSala) { mostrarToast('⚠️ Crie ou entre em uma sala!'); return }
            var t = '📚 Simulado PM-MA - Sala: ' + codigoSala;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(t).then(function() { mostrarToast('📋 Código copiado!') }).catch(function() {
                    prompt('Copie o código:', codigoSala) });
            } else { prompt('Copie o código:', codigoSala) }
        }

        function atualizarRanking() {
            var el = document.getElementById('rankingList');
            if (!participants || participants.length === 0) {
                el.innerHTML = '<div style="color:#8899B0;font-size:13px;">Nenhum participante.</div>';
                return;
            }
            var r = [];
            for (var i = 0; i < participants.length; i++) {
                var p = participants[i];
                var c = 0,
                    e = 0,
                    t = 0,
                    rs = p.respostas || {};
                for (var j = 0; j < state.length; j++) {
                    var q = state[j];
                    if (rs[q.id] !== undefined) { t++; if (rs[q.id] === q.a) c++;
                        else e++ }
                }
                var n = c - e;
                r.push({ nome: p.nome, certas: c, erradas: e, total: t, nota: n });
            }
            r.sort(function(a, b) { if (b.nota !== a.nota) return b.nota - a.nota; return a.nome.localeCompare(b.nome) });
            var h = '';
            for (var k = 0; k < r.length; k++) {
                var x = r[k];
                var pc = '',
                    m = (k + 1) + 'º';
                if (k === 0) { pc = 'ouro';
                    m = '🥇' } else if (k === 1) { pc = 'prata';
                    m = '🥈' } else if (k === 2) { pc = 'bronze';
                    m = '🥉' }
                var est = (x.nome === meuNome) ? ' ⭐' : '';
                h += '<div class="item"><span class="pos ' + pc + '">' + m + '</span><span class="nome">' + x.nome + est +
                    '</span><span class="detalhes">✅' + x.certas + ' ❌' + x.erradas + '</span><span class="nota">' + x
                    .nota + '</span></div>';
            }
            el.innerHTML = h;
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        function iniciarApp() {
            var hasSaved = carregarProgresso();
            if (!hasSaved || state.length === 0) {
                setTimeout(function() { gerarSimulado() }, 100);
            }
            carregarSala();

            // Switch Mobile/Desktop
            document.getElementById('modoSwitch').addEventListener('change', function() {
                var body = document.getElementById('body');
                if (this.checked) {
                    body.className = 'desktop';
                } else {
                    body.className = 'mobile';
                }
            });

            document.getElementById('gerarBtn').addEventListener('click', function() {
                if (state.length > 0) {
                    var tem = false;
                    for (var i = 0; i < state.length; i++) {
                        if (state[i].answered) { tem = true; break; }
                    }
                    if (tem && !confirm('Gerar novo simulado vai resetar o progresso. Continuar?')) return;
                }
                gerarSimulado();
            });

            document.getElementById('criarSalaBtn').addEventListener('click', criarSala);
            document.getElementById('entrarSalaBtn').addEventListener('click', entrarSala);
            document.getElementById('sairSalaBtn').addEventListener('click', sairSala);

            var filtros = document.querySelectorAll('.filtros button');
            for (var f = 0; f < filtros.length; f++) {
                filtros[f].addEventListener('click', function() {
                    var b = document.querySelectorAll('.filtros button');
                    for (var bb = 0; bb < b.length; bb++) { b[bb].className = '' }
                    this.className = 'ativo';
                    currentFilter = this.getAttribute('data-filtro');
                    salvarProgresso();
                    render();
                });
            }

            document.getElementById('resetBtn').addEventListener('click', reiniciar);
            document.getElementById('exportBtn').addEventListener('click', exportarDesempenho);
            document.getElementById('codigoEntrada').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.keyCode === 13) { entrarSala() }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iniciarApp);
        } else {
            iniciarApp();
        }
    </script>
</body>
</html>
