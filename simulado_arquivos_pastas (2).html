<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado PM-MA · Sala de Estudos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0F1E;
    --surface:#141B2D;
    --surface-2:#1E2842;
    --cyan:#22D3EE;
    --cyan-dim:#0891B2;
    --success:#22C55E;
    --success-bg:#1A3A2A;
    --error:#EF4444;
    --error-bg:#3A1A1A;
    --gold:#F59E0B;
    --text:#E8EDF5;
    --text-muted:#8899B0;
    --border:#2A3A55;
    --mono:'IBM Plex Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--sans);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
  }
  .app{max-width:1100px;margin:0 auto;padding:16px;}

  /* HEADER */
  .header{
    background:linear-gradient(135deg,#0F1A3A,#1A2A55);
    padding:24px 28px 18px;
    border-radius:14px;
    border:1px solid var(--border);
    margin-bottom:16px;
  }
  .header-row{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;}
  .title-block .eyebrow{
    font-family:var(--mono); font-size:10px; letter-spacing:0.14em;
    color:var(--cyan); text-transform:uppercase;
  }
  .title-block h1{font-size:22px; margin:0; font-weight:800; background:linear-gradient(135deg,#fff,var(--cyan)); -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .title-block p{margin:0; font-size:12px; color:var(--text-muted);}

  .sala-status{
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    background:rgba(34,211,238,0.08); padding:8px 16px; border-radius:10px;
    border:1px solid rgba(34,211,238,0.15);
  }
  .sala-status .codigo{
    font-family:var(--mono); font-size:22px; font-weight:700; color:var(--cyan); letter-spacing:4px;
  }
  .sala-status .label{font-size:11px; color:var(--text-muted);}
  .sala-status .pessoas{font-size:13px; color:var(--text-muted);}

  .stats-grid{
    display:flex; gap:24px; margin-top:14px; flex-wrap:wrap;
  }
  .stat-item{
    display:flex; align-items:center; gap:8px; font-size:13px;
  }
  .stat-item .num{font-family:var(--mono); font-weight:700; font-size:18px;}
  .stat-item .num.certas{color:var(--success);}
  .stat-item .num.erradas{color:var(--error);}
  .stat-item .num.total{color:var(--cyan);}
  .stat-item .lbl{color:var(--text-muted);}

  .progress-track{
    margin-top:12px; height:4px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg, var(--cyan-dim), var(--cyan));
    width:0%; transition:width 0.4s ease;
    border-radius:4px;
  }

  /* CONTROLES */
  .controls{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    background:var(--surface); padding:16px 20px; border-radius:12px;
    border:1px solid var(--border); margin-bottom:16px;
  }
  .controls select, .controls input, .controls button{
    font-family:var(--sans); font-size:13px; padding:8px 14px;
    border-radius:8px; border:1px solid var(--border);
    background:var(--bg); color:var(--text);
  }
  .controls select{min-width:150px; cursor:pointer;}
  .controls input{width:60px; text-align:center;}
  .controls .btn-gen{
    background:var(--cyan-dim); color:#fff; border-color:var(--cyan-dim); font-weight:600;
  }
  .controls .btn-gen:hover{background:var(--cyan);}
  .controls .btn-copy{
    background:var(--surface-2); border-color:var(--border);
  }
  .controls .btn-copy:hover{border-color:var(--cyan); color:var(--cyan);}
  .controls .btn-sala{
    background:var(--gold); color:#000; border-color:var(--gold); font-weight:700;
  }
  .controls .btn-sala:hover{opacity:0.85;}

  /* FILTROS */
  .filters{
    display:flex; gap:8px; padding-bottom:14px; flex-wrap:wrap;
  }
  .filter-btn{
    font-family:var(--mono); font-size:10px; font-weight:500;
    padding:5px 12px; border-radius:6px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-muted); cursor:pointer;
  }
  .filter-btn:hover{border-color:var(--cyan); color:var(--cyan);}
  .filter-btn.active{
    background:var(--cyan-dim); color:#fff; border-color:var(--cyan-dim);
  }

  /* LISTA */
  .questions{display:flex; flex-direction:column; gap:10px;}
  .qcard{
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:16px 18px; border-left:3px solid var(--border);
  }
  .qcard.answered.correct{border-left-color:var(--success);}
  .qcard.answered.wrong{border-left-color:var(--error);}

  .qmeta{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
  .qid{
    font-family:var(--mono); font-size:10px; font-weight:600;
    color:var(--cyan); background:rgba(34,211,238,0.1); padding:2px 8px; border-radius:4px;
  }
  .qtag{
    font-family:var(--mono); font-size:9px; font-weight:500;
    color:var(--text-muted); background:var(--surface-2); padding:2px 8px; border-radius:4px;
  }
  .qstatus{font-size:9px; font-weight:500; padding:2px 8px; border-radius:4px;}
  .qstatus.done{background:var(--success-bg); color:var(--success);}
  .qstatus.pending{background:#2A2A1A; color:var(--gold);}

  .qstatement{font-size:14px; line-height:1.6; margin-bottom:12px;}
  .qactions{display:flex; gap:8px;}
  .abtn{
    flex:1; font-weight:600; font-size:13px; padding:8px 12px; border-radius:6px;
    cursor:pointer; border:1.5px solid var(--border); background:var(--bg); color:var(--text);
    transition:all 0.15s ease;
  }
  .abtn.certo:hover{background:var(--success-bg); border-color:var(--success); color:var(--success);}
  .abtn.errado:hover{background:var(--error-bg); border-color:var(--error); color:var(--error);}
  .abtn:disabled{cursor:default; opacity:0.6;}
  .abtn.certo.picked{background:var(--success); color:#fff; border-color:var(--success);}
  .abtn.errado.picked{background:var(--error); color:#fff; border-color:var(--error);}
  .abtn.unpicked{opacity:0.25;}

  .feedback{
    margin-top:10px; padding:10px 14px; border-radius:6px; font-size:13px; line-height:1.5;
    display:none;
  }
  .feedback.show{display:block;}
  .feedback.ok{background:var(--success-bg); color:var(--success); border:1px solid rgba(34,197,94,0.2);}
  .feedback.no{background:var(--error-bg); color:var(--error); border:1px solid rgba(239,68,68,0.2);}

  /* RANKING */
  .ranking-box{
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:16px 20px; margin-top:16px;
  }
  .ranking-box h3{font-size:14px; margin:0 0 12px 0; color:var(--gold);}
  .ranking-item{
    display:flex; align-items:center; gap:12px; padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .ranking-item:last-child{border-bottom:none;}
  .ranking-item .pos{font-family:var(--mono); font-size:14px; font-weight:700; width:30px; color:var(--text-muted);}
  .ranking-item .pos.top1{color:var(--gold);}
  .ranking-item .pos.top2{color:#C0C0C0;}
  .ranking-item .pos.top3{color:#CD7F32;}
  .ranking-item .nome{flex:1; font-size:13px;}
  .ranking-item .placar{font-family:var(--mono); font-size:13px; font-weight:600;}
  .ranking-item .placar.certas{color:var(--success);}
  .ranking-item .placar.erradas{color:var(--error);}
  .ranking-item .placar.total{color:var(--cyan);}
  .ranking-item .nota{font-family:var(--mono); font-size:15px; font-weight:700; min-width:60px; text-align:right; color:var(--gold);}

  .empty-state{text-align:center; padding:40px 20px; color:var(--text-muted);}

  .toast{
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:var(--surface); color:#fff; padding:12px 28px; border-radius:10px;
    border:1px solid var(--border); font-size:14px; box-shadow:0 8px 30px rgba(0,0,0,0.5);
    opacity:0; transition:opacity 0.3s ease; pointer-events:none; z-index:999;
  }
  .toast.show{opacity:1;}

  .footer-bar{
    display:flex; gap:10px; justify-content:center; padding:20px 0 10px 0; flex-wrap:wrap;
  }
  .footer-bar button{
    font-family:var(--mono); font-size:11px; color:var(--text-muted);
    background:none; border:1px dashed var(--border); padding:6px 16px;
    border-radius:6px; cursor:pointer;
  }
  .footer-bar button:hover{border-color:var(--error); color:var(--error);}
  .footer-bar .btn-export:hover{border-color:var(--cyan); color:var(--cyan);}

  @media (max-width:700px){
    .header-row{flex-direction:column; align-items:stretch;}
    .sala-status{justify-content:center;}
    .stats-grid{justify-content:space-between;}
    .controls select{min-width:100px;}
  }
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-row">
      <div class="title-block">
        <div class="eyebrow">🎯 SIMULADO EM GRUPO · ESTILO CEBRASPE</div>
        <h1>PM-MA · Edital 2026</h1>
        <p>Responda junto com seus amigos em chamada de vídeo</p>
      </div>
      <div class="sala-status" id="salaStatus">
        <div>
          <div class="label">CÓDIGO DA SALA</div>
          <div class="codigo" id="codigoSala">------</div>
        </div>
        <div>
          <div class="label">PARTICIPANTES</div>
          <div class="pessoas" id="pessoasOnline"><span id="numPessoas">1</span> online</div>
        </div>
        <button class="btn-copy" onclick="copiarCodigo()" style="padding:6px 12px;font-size:12px;">📋 Copiar</button>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-item"><span class="lbl">✅ Certas:</span><span class="num certas" id="statCertas">0</span></div>
      <div class="stat-item"><span class="lbl">❌ Erradas:</span><span class="num erradas" id="statErradas">0</span></div>
      <div class="stat-item"><span class="lbl">📝 Respondidas:</span><span class="num total" id="statTotal">0/0</span></div>
      <div class="stat-item"><span class="lbl">⭐ Nota Cebraspe:</span><span class="num total" id="statNota">0</span></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- CONTROLES -->
  <div class="controls">
    <select id="topicSelect">
      <option value="todos">📚 Todos os tópicos</option>
      <option value="portugues">📖 Português</option>
      <option value="historia">📜 História do Maranhão</option>
      <option value="legislacao">⚖️ Legislação</option>
      <option value="sistema_operacional">🖥️ Sistema Operacional</option>
      <option value="word_writer">📝 Word e Writer</option>
      <option value="excel_calc">📊 Excel e Calc</option>
      <option value="powerpoint_impress">📽️ PowerPoint e Impress</option>
      <option value="internet_intranet">🌐 Internet e Intranet</option>
      <option value="navegadores">🧭 Navegadores</option>
      <option value="correio">✉️ Correio Eletrônico</option>
      <option value="busca">🔍 Sítios de Busca</option>
      <option value="grupos">💬 Grupos de Discussão</option>
      <option value="redes_sociais">📱 Redes Sociais</option>
      <option value="cloud">☁️ Computação em Nuvem</option>
      <option value="seguranca">🔒 Segurança da Informação</option>
    </select>
    <input type="number" id="qtdQuestoes" value="20" min="1" max="200">
    <span style="font-size:12px;color:var(--text-muted);">questões</span>
    <button class="btn-gen" id="gerarBtn">⚡ Gerar simulado</button>
    <button class="btn-sala" id="salaBtn" onclick="criarSala()">🏠 Criar Sala</button>
    <input type="text" id="codigoEntrada" placeholder="Código da sala" style="width:100px;text-align:center;text-transform:uppercase;">
    <button class="btn-sala" onclick="entrarSala()">🔑 Entrar</button>
  </div>

  <!-- FILTROS -->
  <div class="filters">
    <button class="filter-btn active" data-filter="todas">📋 Todas</button>
    <button class="filter-btn" data-filter="nao">⏳ Não respondidas</button>
    <button class="filter-btn" data-filter="acertadas">✅ Acertadas</button>
    <button class="filter-btn" data-filter="erradas">❌ Erradas</button>
  </div>

  <!-- QUESTÕES -->
  <div class="questions" id="questionsList"></div>
  <div class="empty-state" id="emptyState">📝 Clique em "Gerar simulado" para começar!</div>

  <!-- RANKING -->
  <div class="ranking-box" id="rankingBox" style="display:none;">
    <h3>🏆 RANKING DOS PARTICIPANTES</h3>
    <div id="rankingList"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer-bar">
    <button id="resetBtn">↺ Reiniciar minhas respostas</button>
    <button class="btn-export" id="exportBtn">📤 Exportar meu desempenho</button>
    <button onclick="sairSala()" style="border-color:var(--error);color:var(--error);">🚪 Sair da sala</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== BANCO DE QUESTÕES COMPLETO ==========
const DATA = [
  // ===== PORTUGUÊS =====
  {c:"portugues", s:"Na frase 'Os alunos estudaram para a prova', o sujeito é simples e o verbo está na terceira pessoa do plural.", a:true, j:"Correto. 'Os alunos' é sujeito simples; 'estudaram' está na 3ª pessoa do plural."},
  {c:"portugues", s:"O emprego da crase em 'Vou à escola' é obrigatório porque 'escola' é uma palavra feminina e exige o artigo 'a'.", a:true, j:"Correto. Há crase quando há fusão da preposição 'a' com o artigo 'a'."},
  {c:"portugues", s:"Em 'Fazem dois anos que não o vejo', o verbo 'fazer' está corretamente flexionado no plural.", a:false, j:"O verbo 'fazer' indicando tempo decorrido é impessoal, ficando no singular: 'Faz dois anos'."},
  {c:"portugues", s:"Os pronomes oblíquos átonos 'me', 'te', 'se', 'nos', 'vos' podem funcionar como objetos diretos ou indiretos.", a:true, j:"Correto. Esses pronomes podem exercer ambas as funções, dependendo do verbo."},
  {c:"portugues", s:"A palavra 'pé' é um monossílabo tônico e, portanto, deve ser acentuada graficamente.", a:true, j:"Correto. Monossílabos tônicos terminados em 'a', 'e', 'o' seguidos ou não de 's' são acentuados."},
  {c:"portugues", s:"O período composto é formado exclusivamente por orações independentes, sem relação de subordinação.", a:false, j:"Período composto pode ter orações coordenadas e subordinadas. As subordinadas dependem da principal."},
  {c:"portugues", s:"Na voz passiva analítica, o sujeito sofre a ação expressa pelo verbo, que é formado por um verbo auxiliar + particípio.", a:true, j:"Correto. Exemplo: 'O bolo foi comido por João' — 'foi comido' é a voz passiva analítica."},
  {c:"portugues", s:"A palavra 'semicírculo' é formada por derivação prefixal, com o prefixo 'semi-' indicando metade.", a:true, j:"Correto. 'Semi-' é um prefixo que significa 'metade' ou 'meio'."},
  {c:"portugues", s:"O substantivo 'amor' é concreto, pois pode ser percebido pelos sentidos.", a:false, j:"'Amor' é um substantivo abstrato, pois designa um sentimento, algo imaterial."},
  {c:"portugues", s:"Os adjetivos 'bom' e 'mau' variam em gênero e número, assim como 'bons', 'boas', 'maus' e 'más'.", a:true, j:"Correto. Ambos são adjetivos e flexionam-se em gênero e número."},
  {c:"portugues", s:"Em 'Havia muitos alunos na sala', o verbo 'haver' no sentido de 'existir' deve concordar com o sujeito 'alunos'.", a:false, j:"O verbo 'haver' como impessoal fica na terceira pessoa do singular: 'Havia muitos alunos'."},
  {c:"portugues", s:"Os vocábulos 'herói' e 'idéia' são acentuados pela mesma regra da nova ortografia.", a:false, j:"'Herói' mantém acento (hiato), mas 'idéia' perdeu o acento no Novo Acordo Ortográfico (agora 'ideia')."},
  {c:"portugues", s:"A oração subordinada adjetiva restritiva é aquela que restringe o sentido do termo a que se refere, sem vírgulas.", a:true, j:"Correto. As restritivas limitam o significado e não são separadas por vírgulas."},
  {c:"portugues", s:"A conjunção 'porque' (junto) é usada em respostas e explicações, enquanto 'por que' (separado) é usado em perguntas.", a:true, j:"Correto. 'Porque' = pois; 'por que' = motivo (em perguntas)."},
  {c:"portugues", s:"Os artigos definidos e indefinidos são considerados classes de palavras variáveis em gênero e número.", a:true, j:"Correto. Artigos flexionam-se em gênero (o/a, um/uma) e número (os/as, uns/umas)."},
  {c:"portugues", s:"O aposto é um termo acessório da oração que sempre vem separado por vírgulas.", a:false, j:"Aposto pode vir sem vírgulas quando é especificativo ou enumerativo."},
  {c:"portugues", s:"Os verbos da primeira conjugação terminam em -ar, da segunda em -er e da terceira em -ir.", a:true, j:"Correto. Essa é a classificação das conjugações verbais."},
  {c:"portugues", s:"O advérbio 'muito' é invariável e não pode ser flexionado em gênero.", a:false, j:"'Muito' pode variar como adjetivo ('muitos', 'muitas') ou ser invariável como advérbio ('muito bonito')."},
  {c:"portugues", s:"A palavra 'pôr' e 'por' são homófonas, mas apenas 'pôr' recebe acento diferencial.", a:true, j:"Correto. 'Pôr' (verbo) recebe acento para diferenciar da preposição 'por'."},
  {c:"portugues", s:"No período 'Saí, pois estava chovendo', a oração introduzida por 'pois' indica uma causa.", a:true, j:"Correto. 'Pois' introduz uma oração subordinada adverbial causal."},

  // ===== HISTÓRIA DO MARANHÃO =====
  {c:"historia", s:"O estado do Maranhão foi colonizado por portugueses e franceses antes de ser definitivamente incorporado ao Brasil.", a:true, j:"Correto. A França Equinocial (1612-1615) tentou colonizar o Maranhão antes da conquista portuguesa."},
  {c:"historia", s:"São Luís, capital do Maranhão, foi fundada por portugueses em 1612, com o nome de 'São Luís do Maranhão'.", a:false, j:"São Luís foi fundada pelos franceses em 1612, com o nome de 'São Luís' em homenagem a Luís XIII."},
  {c:"historia", s:"A 'Balaiada' foi uma revolta popular ocorrida no Maranhão entre 1838 e 1841, liderada por Manuel dos Santos Lima.", a:true, j:"Correto. A Balaiada foi uma das maiores revoltas do período regencial, com forte participação popular."},
  {c:"historia", s:"A economia colonial do Maranhão baseou-se principalmente na mineração de ouro e diamantes.", a:false, j:"A economia maranhense colonial baseou-se no algodão e no arroz, com destaque para o algodão no século XVIII."},
  {c:"historia", s:"O Maranhão foi palco da 'Guerra dos Bárbaros' no século XVII, um confronto entre colonos e indígenas.", a:true, j:"Correto. A Guerra dos Bárbaros (1680-1720) envolveu conflitos entre colonos e indígenas no Maranhão."},
  {c:"historia", s:"O 'Ciclo do Algodão' no Maranhão ocorreu no século XVIII e impulsionou a economia com a produção de tecidos.", a:true, j:"Correto. O algodão maranhense abasteceu a indústria têxtil europeia no século XVIII."},
  {c:"historia", s:"São Luís foi a capital do Estado do Grão-Pará e Maranhão, criado em 1772.", a:false, j:"Em 1772, o Estado do Grão-Pará e Maranhão foi dividido em dois: Grão-Pará e Maranhão, cada um com sua capital."},
  {c:"historia", s:"A 'Revolta dos Cabanos' (1832-1835) teve forte atuação no Maranhão, em defesa dos interesses dos cabanos.", a:false, j:"A Cabanagem ocorreu principalmente no Pará (1835-1840); no Maranhão houve a Balaiada."},
  {c:"historia", s:"O Maranhão foi pioneiro na construção de ferrovias no Nordeste, com a Estrada de Ferro São Luís-Teresina.", a:true, j:"Correto. A ferrovia São Luís-Teresina foi uma das primeiras do Nordeste."},
  {c:"historia", s:"O município de Alcântara, no Maranhão, possui ruínas de construções coloniais e sítios arqueológicos.", a:true, j:"Correto. Alcântara é um importante sítio histórico com arquitetura colonial preservada."},
  {c:"historia", s:"O Porto de Itaqui, em São Luís, é um dos mais importantes do Nordeste, especializado em exportação de soja.", a:true, j:"Correto. O Porto de Itaqui é um dos principais corredores de exportação de soja do Brasil."},
  {c:"historia", s:"O Maranhão foi o primeiro estado a abolir a escravatura no Brasil, em 1884.", a:false, j:"O Ceará foi o primeiro estado a abolir a escravidão (1884); o Maranhão aboliu em 1884, mas após o Ceará."},

// ========== ESTADO DO SIMULADO ==========
let state = [];
let currentFilter = 'todas';
let currentTopic = 'todos';
let codigoSala = '';
let participantes = [];
let meuNome = '';
let minhasRespostas = {};

// ========== FUNÇÕES DA SALA ==========
function gerarCodigoSala() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let code = '';
  for (let i = 0; i < 6; i++) {
    code += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return code;
}

function criarSala() {
  const nome = prompt('Digite seu nome para entrar na sala:');
  if (!nome) return;
  meuNome = nome;
  codigoSala = gerarCodigoSala();
  document.getElementById('codigoSala').textContent = codigoSala;
  document.getElementById('numPessoas').textContent = '1';
  participantes = [{nome: nome, respostas: {}}];
  document.getElementById('rankingBox').style.display = 'block';
  atualizarRanking();
  showToast(`✅ Sala "${codigoSala}" criada! Compartilhe o código com seus amigos.`);
  document.getElementById('codigoEntrada').value = codigoSala;
  salvarSala();
}

function entrarSala() {
  const codigo = document.getElementById('codigoEntrada').value.trim().toUpperCase();
  if (!codigo) {
    showToast('⚠️ Digite o código da sala!');
    return;
  }
  const nome = prompt('Digite seu nome para entrar na sala:');
  if (!nome) return;
  meuNome = nome;
  codigoSala = codigo;
  document.getElementById('codigoSala').textContent = codigo;
  
  // Verificar se já existe sala salva
  const salva = localStorage.getItem('sala_' + codigo);
  if (salva) {
    try {
      const dados = JSON.parse(salva);
      participantes = dados.participantes || [];
      // Verificar se o nome já está na lista
      if (!participantes.find(p => p.nome === nome)) {
        participantes.push({nome: nome, respostas: {}});
      }
      document.getElementById('numPessoas').textContent = participantes.length;
      document.getElementById('rankingBox').style.display = 'block';
      atualizarRanking();
      showToast(`✅ Entrou na sala "${codigo}"!`);
      salvarSala();
    } catch(e) {
      showToast('⚠️ Erro ao entrar na sala. Tente novamente.');
    }
  } else {
    // Primeira pessoa
    participantes = [{nome: nome, respostas: {}}];
    document.getElementById('numPessoas').textContent = '1';
    document.getElementById('rankingBox').style.display = 'block';
    salvarSala();
    showToast(`✅ Sala "${codigo}" criada!`);
  }
}

function salvarSala() {
  if (!codigoSala) return;
  const dados = {
    participantes: participantes,
    codigo: codigoSala
  };
  localStorage.setItem('sala_' + codigoSala, JSON.stringify(dados));
  // Também salvar a sala atual como "ativa"
  localStorage.setItem('sala_ativa', codigoSala);
}

function carregarSala() {
  const codigo = localStorage.getItem('sala_ativa');
  if (!codigo) return false;
  
  const salva = localStorage.getItem('sala_' + codigo);
  if (!salva) return false;
  
  try {
    const dados = JSON.parse(salva);
    codigoSala = codigo;
    participantes = dados.participantes || [];
    document.getElementById('codigoSala').textContent = codigo;
    document.getElementById('numPessoas').textContent = participantes.length;
    if (participantes.length > 0) {
      document.getElementById('rankingBox').style.display = 'block';
      atualizarRanking();
    }
    return true;
  } catch(e) {
    return false;
  }
}

function sairSala() {
  if (!codigoSala) return;
  if (confirm('Tem certeza que quer sair da sala?')) {
    localStorage.removeItem('sala_ativa');
    codigoSala = '';
    participantes = [];
    document.getElementById('codigoSala').textContent = '------';
    document.getElementById('numPessoas').textContent = '0';
    document.getElementById('rankingBox').style.display = 'none';
    showToast('🚪 Você saiu da sala.');
  }
}

function atualizarRanking() {
  const listEl = document.getElementById('rankingList');
  if (!participantes || participantes.length === 0) {
    listEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">Nenhum participante ainda.</div>';
    return;
  }

  // Calcular nota de cada participante
  const ranking = participantes.map(p => {
    let certas = 0;
    let erradas = 0;
    let total = 0;
    const respostas = p.respostas || {};
    state.forEach(q => {
      if (respostas[q.id]) {
        total++;
        if (respostas[q.id] === q.a) certas++;
        else erradas++;
      }
    });
    const notaCebraspe = certas - erradas; // Uma errada anula uma certa
    return { nome: p.nome, certas, erradas, total, nota: notaCebraspe };
  });

  // Ordenar por nota (maior primeiro)
  ranking.sort((a, b) => b.nota - a.nota || a.nome.localeCompare(b.nome));

  let html = '';
  ranking.forEach((p, i) => {
    const posClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const medalha = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}º`;
    html += `
      <div class="ranking-item">
        <span class="pos ${posClass}">${medalha}</span>
        <span class="nome">${p.nome} ${p.nome === meuNome ? '⭐' : ''}</span>
        <span class="placar certas">${p.certas}✅</span>
        <span class="placar erradas">${p.erradas}❌</span>
        <span class="placar total">${p.total}📝</span>
        <span class="nota">${p.nota}</span>
      </div>
    `;
  });
  listEl.innerHTML = html;
}

function copiarCodigo() {
  if (!codigoSala) {
    showToast('⚠️ Crie ou entre em uma sala primeiro!');
    return;
  }
  const texto = `📚 Simulado PM-MA - Código da sala: ${codigoSala}\nEntre em https://seu-site.com para responder junto!`;
  navigator.clipboard.writeText(texto).then(() => {
    showToast('📋 Código copiado! Compartilhe com seus amigos.');
  }).catch(() => {
    // Fallback
    prompt('Copie o código:', codigoSala);
  });
}

// ========== FUNÇÕES PRINCIPAIS ==========
function getTopicLabel(topic) {
  const map = {
    'portugues':'📖 Português',
    'historia':'📜 História do MA',
    'legislacao':'⚖️ Legislação',
    'sistema_operacional':'🖥️ SO',
    'word_writer':'📝 Word/Writer',
    'excel_calc':'📊 Excel/Calc',
    'powerpoint_impress':'📽️ PowerPoint/Impress',
    'internet_intranet':'🌐 Internet',
    'navegadores':'🧭 Navegadores',
    'correio':'✉️ E-mail',
    'busca':'🔍 Busca',
    'grupos':'💬 Grupos',
    'redes_sociais':'📱 Redes Sociais',
    'cloud':'☁️ Cloud',
    'seguranca':'🔒 Segurança'
  };
  return map[topic] || topic;
}

function getQuestionsForTopic(topic) {
  if (topic === 'todos') return DATA;
  return DATA.filter(q => q.c === topic);
}

function gerarSimulado() {
  const topic = document.getElementById('topicSelect').value;
  const qtd = parseInt(document.getElementById('qtdQuestoes').value) || 20;
  currentTopic = topic;

  let pool = getQuestionsForTopic(topic);
  if (pool.length === 0) {
    showToast('⚠️ Nenhuma questão disponível!');
    return;
  }

  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, Math.min(qtd, shuffled.length));

  state = selected.map((q, i) => ({
    ...q,
    id: i + 1,
    answered: false,
    correct: null
  }));

  // Resetar respostas dos participantes
  participantes.forEach(p => p.respostas = {});

  render();
  salvarProgresso();
  showToast(`✅ ${state.length} questões geradas!`);
}

function render() {
  const listEl = document.getElementById('questionsList');
  const emptyEl = document.getElementById('emptyState');
  listEl.innerHTML = '';

  let visible = state.filter(q => {
    if (currentFilter === 'nao') return !q.answered;
    if (currentFilter === 'acertadas') return q.answered && q.correct;
    if (currentFilter === 'erradas') return q.answered && !q.correct;
    return true;
  });

  emptyEl.style.display = visible.length === 0 ? 'block' : 'none';

  if (state.length === 0) {
    emptyEl.textContent = '📝 Clique em "Gerar simulado" para começar!';
    emptyEl.style.display = 'block';
    updateStats();
    return;
  }

  visible.forEach(q => {
    const card = document.createElement('div');
    card.className = 'qcard' + (q.answered ? (q.correct ? ' answered correct' : ' answered wrong') : '');

    const idStr = String(q.id).padStart(3, '0');
    const statusLabel = q.answered ? (q.correct ? '✅ Acertada' : '❌ Errada') : '⏳ Pendente';
    const statusClass = q.answered ? 'done' : 'pending';

    card.innerHTML = `
      <div class="qmeta">
        <span class="qid">Q ${idStr}</span>
        <span class="qtag">${getTopicLabel(q.c)}</span>
        <span class="qstatus ${statusClass}">${statusLabel}</span>
      </div>
      <div class="qstatement">${q.s}</div>
      <div class="qactions">
        <button class="abtn certo" data-val="true" ${q.answered ? 'disabled' : ''}>✅ CERTO</button>
        <button class="abtn errado" data-val="false" ${q.answered ? 'disabled' : ''}>❌ ERRADO</button>
      </div>
      <div class="feedback ${q.answered ? 'show' : ''} ${q.answered ? (q.correct ? 'ok' : 'no') : ''}">
        ${q.answered ? `<b>${q.correct ? '✅ Você acertou!' : '❌ Você errou.'}</b> Gabarito: <b>${q.a ? 'CERTO' : 'ERRADO'}</b>. ${q.j}` : ''}
      </div>
    `;

    const btnCerto = card.querySelector('.abtn.certo');
    const btnErrado = card.querySelector('.abtn.errado');

    if (q.answered) {
      const userPicked = q.correct ? q.a : !q.a;
      if (userPicked === true) { btnCerto.classList.add('picked'); btnErrado.classList.add('unpicked'); }
      else { btnErrado.classList.add('picked'); btnCerto.classList.add('unpicked'); }
    } else {
      btnCerto.addEventListener('click', () => answer(q.id, true));
      btnErrado.addEventListener('click', () => answer(q.id, false));
    }

    listEl.appendChild(card);
  });

  updateStats();
  salvarProgresso();
  atualizarRanking();
}

function answer(id, userAnswer) {
  const q = state.find(x => x.id === id);
  if (!q || q.answered) return;
  q.answered = true;
  q.correct = (userAnswer === q.a);
  
  // Salvar resposta do participante
  if (meuNome && codigoSala) {
    const participante = participantes.find(p => p.nome === meuNome);
    if (participante) {
      participante.respostas = participante.respostas || {};
      participante.respostas[id] = userAnswer;
      salvarSala();
    }
  }
  
  render();
}

function updateStats() {
  const answered = state.filter(q => q.answered);
  const certas = answered.filter(q => q.correct).length;
  const erradas = answered.filter(q => !q.correct).length;
  const nota = certas - erradas;
  document.getElementById('statCertas').textContent = certas;
  document.getElementById('statErradas').textContent = erradas;
  document.getElementById('statTotal').textContent = `${answered.length}/${state.length}`;
  document.getElementById('statNota').textContent = nota;
  const progress = state.length > 0 ? (answered.length / state.length) * 100 : 0;
  document.getElementById('progressFill').style.width = `${progress}%`;
}

function salvarProgresso() {
  const data = {
    state: state,
    currentFilter: currentFilter,
    currentTopic: currentTopic,
    timestamp: new Date().toISOString()
  };
  localStorage.setItem('simulado_pm_ma', JSON.stringify(data));
}

function carregarProgresso() {
  const saved = localStorage.getItem('simulado_pm_ma');
  if (!saved) return false;

  try {
    const data = JSON.parse(saved);
    if (data.state && data.state.length > 0) {
      state = data.state;
      currentFilter = data.currentFilter || 'todas';
      currentTopic = data.currentTopic || 'todos';
      
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === currentFilter);
      });
      
      const sel = document.getElementById('topicSelect');
      if (sel.querySelector(`option[value="${currentTopic}"]`)) {
        sel.value = currentTopic;
      }
      
      render();
      return true;
    }
  } catch (e) {
    console.error('Erro ao carregar progresso', e);
  }
  return false;
}

function exportarDesempenho() {
  if (state.length === 0) {
    showToast('⚠️ Nenhum simulado para exportar.');
    return;
  }
  
  const answered = state.filter(q => q.answered);
  const certas = answered.filter(q => q.correct).length;
  const erradas = answered.filter(q => !q.correct).length;
  const nota = certas - erradas;
  const total = state.length;

  let txt = `=== RELATÓRIO PM-MA ===\n`;
  txt += `Data: ${new Date().toLocaleString()}\n`;
  txt += `Tópico: ${getTopicLabel(currentTopic)}\n`;
  txt += `Total: ${total} questões\n`;
  txt += `✅ Certas: ${certas}\n`;
  txt += `❌ Erradas: ${erradas}\n`;
  txt += `⭐ Nota Cebraspe: ${nota}\n`;
  txt += `\n--- QUESTÕES ERRADAS ---\n`;
  
  const erradasList = state.filter(q => q.answered && !q.correct);
  if (erradasList.length === 0) {
    txt += `(Nenhuma questão errada. Parabéns! 🎉)\n`;
  } else {
    erradasList.forEach(q => {
      txt += `\nQ${String(q.id).padStart(3,'0')} [${getTopicLabel(q.c)}]\n`;
      txt += `  ${q.s}\n`;
      txt += `  Gabarito: ${q.a ? 'CERTO' : 'ERRADO'}\n`;
      txt += `  ${q.j}\n`;
    });
  }

  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `desempenho_pm_ma_${new Date().toISOString().slice(0,10)}.txt`;
  link.click();
  URL.revokeObjectURL(link.href);

  showToast('📤 Relatório exportado!');
}

function reiniciar() {
  if (state.length === 0) {
    showToast('⚠️ Nenhum simulado ativo.');
    return;
  }
  if (!confirm('Resetar suas respostas?')) return;
  
  state = state.map(q => ({ ...q, answered: false, correct: null }));
  // Limpar respostas do participante
  if (meuNome && codigoSala) {
    const participante = participantes.find(p => p.nome === meuNome);
    if (participante) participante.respostas = {};
    salvarSala();
  }
  render();
  showToast('↺ Respostas resetadas!');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 2800);
}

// ========== EVENTOS ==========
document.addEventListener('DOMContentLoaded', () => {
  // Carregar progresso
  const hasSaved = carregarProgresso();
  if (!hasSaved) {
    // Gerar simulado inicial
    document.getElementById('gerarBtn').click();
  }
  
  // Carregar sala
  carregarSala();

  document.getElementById('gerarBtn').addEventListener('click', () => {
    if (state.length > 0 && state.some(q => q.answered)) {
      if (!confirm('Gerar novo simulado vai resetar o progresso. Continuar?')) return;
    }
    gerarSimulado();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      salvarProgresso();
      render();
    });
  });

  document.getElementById('resetBtn').addEventListener('click', reiniciar);
  document.getElementById('exportBtn').addEventListener('click', exportarDesempenho);
  
  // Enter no campo de código
  document.getElementById('codigoEntrada').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') entrarSala();
  });
});
</script>
</body>
